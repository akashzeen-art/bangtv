<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bang Tv</title>
    <script>
      // SPA fallback: GitHub Pages uses /bangtv; Vercel/Netlify use /
      (function () {
        var l = window.location;
        var repoBase =
          l.pathname.indexOf('/bangtv') === 0 ? '/bangtv' : '';

        if (l.search.indexOf('__gh_path__') !== -1) {
          l.replace((repoBase || '') + '/');
          return;
        }

        sessionStorage.setItem('ghSpaRedirect', l.href);
        l.replace((repoBase || '') + '/');
      })();
    </script>
  </head>
  <body></body>
</html>

<!DOCTYPE html>

<head>

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <script>
      // GitHub Pages SPA redirect handler (pairs with /public/404.html)
      (function () {
        var base = '%BASE_URL%';
        if (base.slice(-1) !== '/') base += '/';

        // Legacy query-param redirects: strip params once (do not re-encode)
        var params = new URLSearchParams(window.location.search);
        if (params.has('__gh_path__')) {
          var legacyPath = params.get('__gh_path__') || '/';
          if (legacyPath.charAt(0) !== '/') legacyPath = '/' + legacyPath;
          var clean = new URL(window.location.href);
          clean.search = '';
          clean.pathname = base.replace(/\/$/, '') + legacyPath;
          window.history.replaceState(null, '', clean.pathname + clean.search + clean.hash);
          return;
        }

        // sessionStorage redirect from 404.html
        var stored = sessionStorage.getItem('ghSpaRedirect');
        if (!stored) return;
        sessionStorage.removeItem('ghSpaRedirect');

        try {
          var target = new URL(stored);
          var basePath = new URL(base, target.origin).pathname.replace(/\/$/, '');
          var path = target.pathname;
          if (basePath && path.indexOf(basePath) === 0) {
            path = path.slice(basePath.length) || '/';
          }
          var next = path + target.search + target.hash;
          window.history.replaceState(null, '', next);
        } catch (e) {
          /* ignore malformed stored URL */
        }
      })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"/>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

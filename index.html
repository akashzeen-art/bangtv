<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bang Tv</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script>
      // GitHub Pages SPA redirect handler (pairs with /public/404.html)
      (function () {
        var params = new URLSearchParams(window.location.search);
        var ghPath = params.get('__gh_path__');
        if (!ghPath) return;

        var ghSearch = params.get('__gh_search__') || '';
        var ghHash = params.get('__gh_hash__') || '';

        // Ensure leading slash
        if (ghPath.charAt(0) !== '/') ghPath = '/' + ghPath;

        // ghSearch was encoded including leading '?', keep it as-is
        var newUrl = ghPath + (ghSearch || '') + (ghHash || '');
        window.history.replaceState(null, '', newUrl);
      })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"/>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
</body>
</html>
